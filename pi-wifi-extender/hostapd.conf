# Alfa Wi-Fi (wlan1) as AP / extender — DO NOT use for wlan0 (bridge)
# Copy to Pi: sudo cp hostapd.conf /etc/hostapd/hostapd.conf

interface=wlan1
driver=nl80211
ssid=MyHomeExtender
hw_mode=g
channel=6
wmm_enabled=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=StrongPassword123
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
